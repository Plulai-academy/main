<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>No streak ember mascot</title>
<style>
.bodyGroup{transform-origin:100px 212px;animation:sadDroop 3.6s ease-in-out infinite;}
.earL,.earR{animation:dimFlame 0.6s ease-out forwards;}
.tail{transform-origin:146px 196px;animation:tailDroop 0.6s ease-out forwards;}
@keyframes sadDroop{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(5px) rotate(2deg);}}
@keyframes dimFlame{from{fill:#FFD23F;opacity:1;}to{fill:#8A8F94;opacity:0.6;}}
@keyframes tailDroop{from{transform:rotate(0deg);}to{transform:rotate(-25deg);}}
</style>
