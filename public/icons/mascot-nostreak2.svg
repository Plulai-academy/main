<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>No streak mascot</title>
<style>
.bodyGroup{transform-origin:100px 224px;animation:sadDroop 3.6s ease-in-out infinite;}
.antenna{transform-origin:100px 62px;animation:antennaDroop 0.6s ease-out forwards;}
.cloudGroup{animation:cloudDrift 4s ease-in-out infinite;}
@keyframes sadDroop{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(5px) rotate(2deg);}}
@keyframes antennaDroop{from{transform:rotate(0deg);}to{transform:rotate(18deg);}}
@keyframes cloudDrift{0%,100%{transform:translateX(0);}50%{transform:translateX(6px);}}
</style>
<ellipse cx="100" cy="226" rx="50" ry="8" fill="rgba(130,130,130,0.22)"/>
