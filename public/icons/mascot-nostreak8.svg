<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>No streak sprout mascot</title>
<style>
.bodyGroup{transform-origin:100px 208px;animation:sadDroop 3.6s ease-in-out infinite;}
.leafL{transform-origin:68px 82px;animation:leafWiltL 0.6s ease-out forwards;}
.leafR{transform-origin:132px 82px;animation:leafWiltR 0.6s ease-out forwards;}
@keyframes sadDroop{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(5px) rotate(2deg);}}
@keyframes leafWiltL{from{transform:rotate(0deg);fill:#7ED957;}to{transform:rotate(20deg);fill:#A88B4A;}}
@keyframes leafWiltR{from{transform:rotate(0deg);fill:#7ED957;}to{transform:rotate(-20deg);fill:#A88B4A;}}
</style>
