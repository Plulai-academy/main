<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <style>
    .body-group { transform-origin: 100px 200px; animation: breathe 3.2s ease-in-out infinite; }
    .antenna-ball { transform-origin: 100px 18px; animation: antennaSway 3.2s ease-in-out infinite; }
    .eye { animation: blink 4.5s ease-in-out infinite; transform-origin: center; }
    .eye-r { animation-delay: 0s; }
    .eye-l { animation-delay: 0s; }

    @keyframes breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-2px) scale(1.01); }
    }
    @keyframes antennaSway {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(4deg); }
    }
    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      96%           { transform: scaleY(0.1); }
    }
  </style>

  <g class="body-group">
    <!-- Antenna -->
    <line x1="100" y1="40" x2="100" y2="20" stroke="#C9D3DC" stroke-width="4" stroke-linecap="round"/>
    <circle class="antenna-ball" cx="100" cy="16" r="7" fill="#1CB0F6"/>

    <!-- Head -->
    <rect x="48" y="38" width="104" height="86" rx="40" fill="#F4F6F8"/>
    <rect x="48" y="38" width="104" height="86" rx="40" fill="none" stroke="#D7DEE5" stroke-width="2"/>

    <!-- Visor / face screen -->
    <rect x="64" y="58" width="72" height="42" rx="21" fill="#16202B"/>
    <ellipse class="eye eye-l" cx="86"  cy="79" rx="7" ry="9" fill="#34E0FF"/>
    <ellipse class="eye eye-r" cx="114" cy="79" rx="7" ry="9" fill="#34E0FF"/>

    <!-- Ear nubs -->
    <circle cx="46" cy="82" r="7" fill="#D7DEE5"/>
    <circle cx="154" cy="82" r="7" fill="#D7DEE5"/>

    <!-- Body -->
    <rect x="40" y="128" width="120" height="92" rx="46" fill="#FFFFFF"/>
    <rect x="40" y="128" width="120" height="92" rx="46" fill="none" stroke="#D7DEE5" stroke-width="2"/>

    <!-- Chest badge -->
    <circle cx="100" cy="162" r="20" fill="#F5A623"/>
    <circle cx="100" cy="162" r="20" fill="none" stroke="#1CB0F6" stroke-width="4"/>
    <text x="100" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="20" fill="#FFFFFF">P</text>

    <!-- Arms -->
    <rect x="18" y="148" width="26" height="46" rx="13" fill="#FFFFFF" stroke="#D7DEE5" stroke-width="2"/>
    <rect x="156" y="148" width="26" height="46" rx="13" fill="#FFFFFF" stroke="#D7DEE5" stroke-width="2"/>

    <!-- Laptop -->
    <rect x="58" y="196" width="84" height="14" rx="4" fill="#7C8894"/>
    <rect x="64" y="180" width="72" height="20" rx="3" fill="#3A4450"/>
  </g>
</svg>
