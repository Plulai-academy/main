<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>Celebrating mascot</title>
<style>
.bodyGroup{transform-origin:100px 224px;animation:bounce 0.55s ease-in-out infinite;}
.armLeft{transform-origin:48px 142px;animation:armSwingL 0.55s ease-in-out infinite;}
.armRight{transform-origin:152px 142px;animation:armSwingR 0.55s ease-in-out infinite;}
.c1{animation:confettiFall 1.3s linear infinite;}
.c2{animation:confettiFall 1.3s linear infinite 0.2s;}
.c3{animation:confettiFall 1.3s linear infinite 0.4s;}
.c4{animation:confettiFall 1.3s linear infinite 0.6s;}
.c5{animation:confettiFall 1.3s linear infinite 0.8s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
@keyframes armSwingL{0%,100%{transform:rotate(0deg);}50%{transform:rotate(-30deg);}}
@keyframes armSwingR{0%,100%{transform:rotate(0deg);}50%{transform:rotate(30deg);}}
@keyframes confettiFall{0%{transform:translateY(-6px);opacity:1;}100%{transform:translateY(26px);opacity:0;}}
</style>
<ellipse cx="100" cy="226" rx="50" ry="8" fill="rgba(130,130,130,0.22)"/>
<g class="bodyGroup">
<path d="M100 62 C 94 48 94 38 100 30" stroke="#1F8A5C" stroke-width="5" fill="none" stroke-linecap="round"/>
<circle cx="100" cy="30" r="7" fill="#FFC94D"/>
<path class="armLeft" d="M48 142 C 30 137 18 147 14 162" stroke="#1F8A5C" stroke-width="10" fill="none" stroke-linecap="round"/>
<path class="armRight" d="M152 142 C 170 137 182 147 186 162" stroke="#1F8A5C" stroke-width="10" fill="none" stroke-linecap="round"/>
<path d="M100 67 C 145 67 165 112 160 157 C 158 197 130 222 100 222 C 70 222 42 197 40 157 C 35 112 55 67 100 67 Z" fill="#2DBE8E"/>
<ellipse cx="100" cy="162" rx="34" ry="42" fill="#7FE0BA" opacity="0.55"/>
<ellipse cx="78" cy="224" rx="14" ry="7" fill="#1F8A5C"/>
<ellipse cx="122" cy="224" rx="14" ry="7" fill="#1F8A5C"/>
<path d="M69 134 q11 -13 22 0" stroke="#16202B" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M109 134 q11 -13 22 0" stroke="#16202B" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M76 154 q24 26 48 0 q-24 18 -48 0 Z" fill="#16202B"/>
<ellipse cx="62" cy="148" rx="8" ry="5" fill="#FF8FA8"/>
<ellipse cx="138" cy="148" rx="8" ry="5" fill="#FF8FA8"/>
</g>
<g>
<rect class="c1" x="20" y="54" width="8" height="8" fill="#FFC94D"/>
<rect class="c2" x="170" y="64" width="8" height="8" fill="#3D8BFF"/>
<circle class="c3" cx="34" cy="88" r="5" fill="#FF6B6B"/>
<circle class="c4" cx="164" cy="94" r="5" fill="#7FE0BA"/>
<rect class="c5" x="94" y="36" width="8" height="8" fill="#FFC94D"/>
</g>
</svg>
