<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>Idle droplet mascot</title>
<style>
.bodyGroup{transform-origin:100px 218px;animation:idleSway 3.2s ease-in-out infinite;}
.eyeL{transform-origin:80px 150px;animation:blink 4.5s ease-in-out infinite;}
.eyeR{transform-origin:120px 150px;animation:blink 4.5s ease-in-out infinite;}
.waveTuft{transform-origin:98px 70px;animation:tuftWobble 2.8s ease-in-out infinite;}
.tailFin{transform-origin:146px 192px;animation:tailSway 2.8s ease-in-out infinite;}
@keyframes idleSway{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);}}
@keyframes blink{0%,92%,100%{transform:scaleY(1);}96%{transform:scaleY(0.12);}}
@keyframes tuftWobble{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
@keyframes tailSway{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
</style>
<ellipse cx="100" cy="226" rx="50" ry="8" fill="rgba(130,130,130,0.22)"/>
<g class="bodyGroup">
<path class="waveTuft" d="M98 70 C 92 56 94 42 106 36 C 102 48 106 58 98 70 Z" fill="#8FD9F2"/>
<path d="M46 150 C 30 146 20 154 16 168" stroke="#1C5F8E" stroke-width="9" fill="none" stroke-linecap="round"/>
<path d="M154 150 C 170 146 180 154 184 168" stroke="#1C5F8E" stroke-width="9" fill="none" stroke-linecap="round"/>
<path class="tailFin" d="M146 188 C 162 182 174 192 168 206 C 158 200 148 200 144 204 Z" fill="#1C5F8E"/>
<path d="M100 70 C 130 110 158 150 152 184 C 148 206 126 222 100 222 C 74 222 52 206 48 184 C 42 150 70 110 100 70 Z" fill="#36A9E1"/>
<ellipse cx="100" cy="165" rx="28" ry="36" fill="#8FD9F2" opacity="0.5"/>
<ellipse cx="80" cy="218" rx="12" ry="6" fill="#1C5F8E"/>
<ellipse cx="120" cy="218" rx="12" ry="6" fill="#1C5F8E"/>
<g class="eyeL"><ellipse cx="80" cy="150" rx="11" ry="14" fill="#FFFFFF"/><circle cx="83" cy="153" r="5" fill="#0F3550"/></g>
<g class="eyeR"><ellipse cx="120" cy="150" rx="11" ry="14" fill="#FFFFFF"/><circle cx="123" cy="153" r="5" fill="#0F3550"/></g>
<path d="M84 176 q16 12 32 0" stroke="#0F3550" stroke-width="4" fill="none" stroke-linecap="round"/>
</g>
</svg>
