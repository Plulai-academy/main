<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>Tired breeze mascot</title>
<style>
.bodyGroup{transform-origin:100px 212px;animation:tiredSlump 3.6s ease-in-out infinite;}
.mouthYawn{transform-origin:100px 160px;animation:yawn 2.6s ease-in-out infinite;}
.z1{animation:floatUp 2.4s ease-in infinite;}
.z2{animation:floatUp 2.4s ease-in infinite 0.6s;}
.z3{animation:floatUp 2.4s ease-in infinite 1.2s;}
@keyframes tiredSlump{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(4px) rotate(-1.5deg);}}
@keyframes yawn{0%,78%,100%{transform:scaleY(1);}40%{transform:scaleY(1.6);}}
@keyframes floatUp{0%{transform:translateY(0);opacity:0;}20%{opacity:1;}100%{transform:translateY(-26px);opacity:0;}}
</style>
<ellipse cx="100" cy="220" rx="50" ry="8" fill="rgba(130,130,130,0.22)"/>
<g class="bodyGroup">
<g><circle cx="78" cy="70" r="16" fill="#C9C2FF"/><circle cx="100" cy="58" r="19" fill="#C9C2FF"/><circle cx="122" cy="70" r="16" fill="#C9C2FF"/></g>
<path d="M44 142 C 28 138 18 146 14 160" stroke="#5A4FB5" stroke-width="9" fill="none" stroke-linecap="round"/>
<path d="M156 142 C 172 138 182 146 186 160" stroke="#5A4FB5" stroke-width="9" fill="none" stroke-linecap="round"/>
<path d="M138 170 C 154 164 166 172 162 184 C 154 178 144 178 138 182 Z" fill="#5A4FB5"/>
<path d="M100 82 C 138 82 156 116 152 152 C 150 190 126 212 100 212 C 74 212 50 190 48 152 C 44 116 62 82 100 82 Z" fill="#8B7FE8"/>
<ellipse cx="100" cy="148" rx="30" ry="38" fill="#C9C2FF" opacity="0.5"/>
<ellipse cx="80" cy="212" rx="13" ry="7" fill="#5A4FB5"/>
<ellipse cx="120" cy="212" rx="13" ry="7" fill="#5A4FB5"/>
<path d="M69 134 q11 6 22 0" stroke="#2E2360" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M109 134 q11 6 22 0" stroke="#2E2360" stroke-width="4" fill="none" stroke-linecap="round"/>
<ellipse class="mouthYawn" cx="100" cy="160" rx="7" ry="9" fill="#2E2360"/>
</g>
<g>
<text class="z1" x="160" y="58" font-size="16" fill="#8F87C4">Z</text>
<text class="z2" x="174" y="44" font-size="14" fill="#8F87C4">Z</text>
<text class="z3" x="186" y="32" font-size="11" fill="#8F87C4">z</text>
</g>
</svg>
