<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>Tired mascot</title>
<style>
.bodyGroup{transform-origin:100px 224px;animation:tiredSlump 3.6s ease-in-out infinite;}
.mouthYawn{transform-origin:100px 160px;animation:yawn 2.6s ease-in-out infinite;}
.z1{animation:floatUp 2.4s ease-in infinite;}
.z2{animation:floatUp 2.4s ease-in infinite 0.6s;}
.z3{animation:floatUp 2.4s ease-in infinite 1.2s;}
@keyframes tiredSlump{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(4px) rotate(-1.5deg);}}
@keyframes yawn{0%,78%,100%{transform:scaleY(1);}40%{transform:scaleY(1.6);}}
@keyframes floatUp{0%{transform:translateY(0);opacity:0;}20%{opacity:1;}100%{transform:translateY(-26px);opacity:0;}}
</style>
<ellipse cx="100" cy="226" rx="50" ry="8" fill="rgba(130,130,130,0.22)"/>
<g class="bodyGroup">
<path d="M100 62 C 94 48 94 38 100 30" stroke="#1F8A5C" stroke-width="5" fill="none" stroke-linecap="round"/>
<circle cx="100" cy="30" r="7" fill="#FFC94D"/>
<path d="M48 142 C 30 137 18 147 14 162" stroke="#1F8A5C" stroke-width="10" fill="none" stroke-linecap="round"/>
<path d="M152 142 C 170 137 182 147 186 162" stroke="#1F8A5C" stroke-width="10" fill="none" stroke-linecap="round"/>
<path d="M100 67 C 145 67 165 112 160 157 C 158 197 130 222 100 222 C 70 222 42 197 40 157 C 35 112 55 67 100 67 Z" fill="#2DBE8E"/>
<ellipse cx="100" cy="162" rx="34" ry="42" fill="#7FE0BA" opacity="0.55"/>
<ellipse cx="78" cy="224" rx="14" ry="7" fill="#1F8A5C"/>
<ellipse cx="122" cy="224" rx="14" ry="7" fill="#1F8A5C"/>
<path d="M69 134 q11 7 22 0" stroke="#16202B" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M109 134 q11 7 22 0" stroke="#16202B" stroke-width="4" fill="none" stroke-linecap="round"/>
<ellipse class="mouthYawn" cx="100" cy="160" rx="8" ry="10" fill="#16202B"/>
</g>
<g>
<text class="z1" x="160" y="60" font-size="16" fill="#9AA7B5">Z</text>
<text class="z2" x="174" y="46" font-size="14" fill="#9AA7B5">Z</text>
<text class="z3" x="186" y="34" font-size="11" fill="#9AA7B5">z</text>
</g>
</svg>
