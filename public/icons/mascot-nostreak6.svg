<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>No streak pebble mascot</title>
<style>
.bodyGroup{transform-origin:100px 206px;animation:sadDroop 3.6s ease-in-out infinite;}
.crystalTuft path{animation:gemDim 0.6s ease-out forwards;}
.crackLine{animation:crackIn 0.4s ease-out forwards;}
@keyframes sadDroop{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(5px) rotate(2deg);}}
@keyframes gemDim{from{fill:#5ECDD1;}to{fill:#8A8580;}}
@keyframes crackIn{from{opacity:0;}to{opacity:1;}}
</style>
