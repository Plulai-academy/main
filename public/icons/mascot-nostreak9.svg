<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>No streak berry mascot</title>
<style>
.bodyGroup{transform-origin:100px 210px;animation:sadDroop 3.6s ease-in-out infinite;}
.stem{transform-origin:100px 86px;animation:stemDroop 0.6s ease-out forwards;}
.leaf{animation:leafWilt 0.6s ease-out forwards;}
@keyframes sadDroop{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(5px) rotate(2deg);}}
@keyframes stemDroop{from{transform:rotate(0deg);}to{transform:rotate(35deg);}}
@keyframes leafWilt{from{fill:#6FBF4A;}to{fill:#A8835A;}}
</style>
