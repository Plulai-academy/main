<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>Tired ember mascot</title>
<style>
.bodyGroup{transform-origin:100px 212px;animation:tiredSlump 3.6s ease-in-out infinite;}
.mouthYawn{transform-origin:100px 172px;animation:yawn 2.6s ease-in-out infinite;}
.z1{animation:floatUp 2.4s ease-in infinite;}
.z2{animation:floatUp 2.4s ease-in infinite 0.6s;}
.z3{animation:floatUp 2.4s ease-in infinite 1.2s;}
@keyframes tiredSlump{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(4px) rotate(-1.5deg);}}
@keyframes yawn{0%,78%,100%{transform:scaleY(1);}40%{transform:scaleY(1.6);}}
@keyframes floatUp{0%{transform:translateY(0);opacity:0;}20%{opacity:1;}100%{transform:translateY(-26px);opacity:0;}}
</style>
<ellipse cx="100" cy="222" rx="50" ry="8" fill="rgba(130,130,130,0.22)"/>
<g class="bodyGroup">
<path d="M80 86 C 72 78 70 66 78 54 C 84 64 86 78 80 86 Z" fill="#FFD23F"/>
<path d="M120 86 C 128 78 130 66 122 54 C 116 64 114 78 120 86 Z" fill="#FFD23F"/>
<path d="M44 150 C 28 146 18 154 14 168" stroke="#C75A35" stroke-width="9" fill="none" stroke-linecap="round"/>
<path d="M156 150 C 172 146 182 154 186 168" stroke="#C75A35" stroke-width="9" fill="none" stroke-linecap="round"/>
<path d="M146 192 C 162 188 172 198 166 210 C 160 204 152 202 146 206 Z" fill="#FFD23F"/>
<path d="M100 84 C 139 84 156 119 154 154 C 152 192 129 212 100 212 C 71 212 48 192 46 154 C 44 119 61 84 100 84 Z" fill="#FF8C61"/>
<ellipse cx="100" cy="158" rx="30" ry="38" fill="#FFB089" opacity="0.5"/>
<ellipse cx="80" cy="212" rx="13" ry="7" fill="#C75A35"/>
<ellipse cx="120" cy="212" rx="13" ry="7" fill="#C75A35"/>
<path d="M69 146 q11 6 22 0" stroke="#3A2618" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M109 146 q11 6 22 0" stroke="#3A2618" stroke-width="4" fill="none" stroke-linecap="round"/>
<ellipse class="mouthYawn" cx="100" cy="172" rx="7" ry="9" fill="#3A2618"/>
</g>
<g>
<text class="z1" x="160" y="64" font-size="16" fill="#9B9388">Z</text>
<text class="z2" x="174" y="50" font-size="14" fill="#9B9388">Z</text>
<text class="z3" x="186" y="38" font-size="11" fill="#9B9388">z</text>
</g>
</svg>
