<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>Idle mascot</title>
<style>
.bodyGroup{transform-origin:100px 224px;animation:idleSway 3.2s ease-in-out infinite;}
.eyeL{transform-origin:80px 132px;animation:blink 4.5s ease-in-out infinite;}
.eyeR{transform-origin:120px 132px;animation:blink 4.5s ease-in-out infinite;}
.antennaTip{animation:glow 2.4s ease-in-out infinite;}
@keyframes idleSway{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);}}
@keyframes blink{0%,92%,100%{transform:scaleY(1);}96%{transform:scaleY(0.12);}}
@keyframes glow{0%,100%{opacity:1;}50%{opacity:0.5;}}
</style>
<ellipse cx="100" cy="226" rx="50" ry="8" fill="rgba(130,130,130,0.22)"/>
<g class="bodyGroup">
<path d="M100 62 C 94 48 94 38 100 30" stroke="#1F8A5C" stroke-width="5" fill="none" stroke-linecap="round"/>
<circle class="antennaTip" cx="100" cy="30" r="7" fill="#FFC94D"/>
<path d="M48 142 C 30 137 18 147 14 162" stroke="#1F8A5C" stroke-width="10" fill="none" stroke-linecap="round"/>
<path d="M152 142 C 170 137 182 147 186 162" stroke="#1F8A5C" stroke-width="10" fill="none" stroke-linecap="round"/>
<path d="M100 67 C 145 67 165 112 160 157 C 158 197 130 222 100 222 C 70 222 42 197 40 157 C 35 112 55 67 100 67 Z" fill="#2DBE8E"/>
<ellipse cx="100" cy="162" rx="34" ry="42" fill="#7FE0BA" opacity="0.55"/>
<ellipse cx="78" cy="224" rx="14" ry="7" fill="#1F8A5C"/>
<ellipse cx="122" cy="224" rx="14" ry="7" fill="#1F8A5C"/>
<g class="eyeL"><ellipse cx="80" cy="132" rx="12" ry="15" fill="#FFFFFF"/><circle cx="83" cy="135" r="5.5" fill="#16202B"/></g>
<g class="eyeR"><ellipse cx="120" cy="132" rx="12" ry="15" fill="#FFFFFF"/><circle cx="123" cy="135" r="5.5" fill="#16202B"/></g>
<path d="M84 158 q16 13 32 0" stroke="#16202B" stroke-width="4" fill="none" stroke-linecap="round"/>
</g>
</svg>
