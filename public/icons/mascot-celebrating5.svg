<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>Celebrating breeze mascot</title>
<style>
.bodyGroup{transform-origin:100px 212px;animation:bounce 0.55s ease-in-out infinite;}
.armLeft{transform-origin:44px 142px;animation:armSwingL 0.55s ease-in-out infinite;}
.armRight{transform-origin:156px 142px;animation:armSwingR 0.55s ease-in-out infinite;}
.tailWisp{transform-origin:138px 170px;animation:tailWag 0.4s ease-in-out infinite;}
.s1{animation:twinkle 1.2s ease-in-out infinite;}
.s2{animation:twinkle 1.2s ease-in-out infinite 0.15s;}
.s3{animation:twinkle 1.2s ease-in-out infinite 0.3s;}
.s4{animation:twinkle 1.2s ease-in-out infinite 0.45s;}
.s5{animation:twinkle 1.2s ease-in-out infinite 0.6s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
@keyframes armSwingL{0%,100%{transform:rotate(0deg);}50%{transform:rotate(-30deg);}}
@keyframes armSwingR{0%,100%{transform:rotate(0deg);}50%{transform:rotate(30deg);}}
@keyframes tailWag{0%,100%{transform:rotate(-18deg);}50%{transform:rotate(18deg);}}
@keyframes twinkle{0%,100%{transform:scale(0);opacity:0;}50%{transform:scale(1);opacity:1;}}
</style>
<ellipse cx="100" cy="220" rx="50" ry="8" fill="rgba(130,130,130,0.22)"/>
<g class="bodyGroup">
<g><circle cx="78" cy="70" r="16" fill="#C9C2FF"/><circle cx="100" cy="58" r="19" fill="#C9C2FF"/><circle cx="122" cy="70" r="16" fill="#C9C2FF"/></g>
<path class="armLeft" d="M44 142 C 28 138 18 146 14 160" stroke="#5A4FB5" stroke-width="9" fill="none" stroke-linecap="round"/>
<path class="armRight" d="M156 142 C 172 138 182 146 186 160" stroke="#5A4FB5" stroke-width="9" fill="none" stroke-linecap="round"/>
<path class="tailWisp" d="M138 170 C 154 164 166 172 162 184 C 154 178 144 178 138 182 Z" fill="#5A4FB5"/>
<path d="M100 82 C 138 82 156 116 152 152 C 150 190 126 212 100 212 C 74 212 50 190 48 152 C 44 116 62 82 100 82 Z" fill="#8B7FE8"/>
<ellipse cx="100" cy="148" rx="30" ry="38" fill="#C9C2FF" opacity="0.5"/>
<ellipse cx="80" cy="212" rx="13" ry="7" fill="#5A4FB5"/>
<ellipse cx="120" cy="212" rx="13" ry="7" fill="#5A4FB5"/>
<path d="M69 134 q11 -12 22 0" stroke="#2E2360" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M109 134 q11 -12 22 0" stroke="#2E2360" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M76 154 q24 24 48 0 q-24 16 -48 0 Z" fill="#2E2360"/>
<ellipse cx="62" cy="146" rx="7" ry="4" fill="#FF8FA8"/>
<ellipse cx="138" cy="146" rx="7" ry="4" fill="#FF8FA8"/>
</g>
<g transform="translate(20,30)"><polygon class="s1" points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" fill="#C9C2FF"/></g>
<g transform="translate(166,40)"><polygon class="s2" points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" fill="#C9C2FF"/></g>
<g transform="translate(10,76)"><polygon class="s3" points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" fill="#C9C2FF"/></g>
<g transform="translate(174,88)"><polygon class="s4" points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" fill="#C9C2FF"/></g>
<g transform="translate(100,20)"><polygon class="s5" points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" fill="#C9C2FF"/></g>
</svg>
