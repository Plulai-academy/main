<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>Celebrating ember mascot</title>
<style>
.bodyGroup{transform-origin:100px 212px;animation:bounce 0.55s ease-in-out infinite;}
.armLeft{transform-origin:44px 150px;animation:armSwingL 0.55s ease-in-out infinite;}
.armRight{transform-origin:156px 150px;animation:armSwingR 0.55s ease-in-out infinite;}
.tail{transform-origin:146px 196px;animation:tailWag 0.4s ease-in-out infinite;}
.s1{animation:twinkle 1.2s ease-in-out infinite;}
.s2{animation:twinkle 1.2s ease-in-out infinite 0.15s;}
.s3{animation:twinkle 1.2s ease-in-out infinite 0.3s;}
.s4{animation:twinkle 1.2s ease-in-out infinite 0.45s;}
.s5{animation:twinkle 1.2s ease-in-out infinite 0.6s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
@keyframes armSwingL{0%,100%{transform:rotate(0deg);}50%{transform:rotate(-30deg);}}
@keyframes armSwingR{0%,100%{transform:rotate(0deg);}50%{transform:rotate(30deg);}}
@keyframes tailWag{0%,100%{transform:rotate(-18deg);}50%{transform:rotate(18deg);}}
@keyframes twinkle{0%,100%{transform:scale(0);opacity:0;}50%{transform:scale(1);opacity:1;}}
</style>
<ellipse cx="100" cy="222" rx="50" ry="8" fill="rgba(130,130,130,0.22)"/>
<g class="bodyGroup">
<path d="M80 86 C 72 78 70 66 78 54 C 84 64 86 78 80 86 Z" fill="#FFD23F"/>
<path d="M120 86 C 128 78 130 66 122 54 C 116 64 114 78 120 86 Z" fill="#FFD23F"/>
<path class="armLeft" d="M44 150 C 28 146 18 154 14 168" stroke="#C75A35" stroke-width="9" fill="none" stroke-linecap="round"/>
<path class="armRight" d="M156 150 C 172 146 182 154 186 168" stroke="#C75A35" stroke-width="9" fill="none" stroke-linecap="round"/>
<path class="tail" d="M146 192 C 162 188 172 198 166 210 C 160 204 152 202 146 206 Z" fill="#FFD23F"/>
<path d="M100 84 C 139 84 156 119 154 154 C 152 192 129 212 100 212 C 71 212 48 192 46 154 C 44 119 61 84 100 84 Z" fill="#FF8C61"/>
<ellipse cx="100" cy="158" rx="30" ry="38" fill="#FFB089" opacity="0.5"/>
<ellipse cx="80" cy="212" rx="13" ry="7" fill="#C75A35"/>
<ellipse cx="120" cy="212" rx="13" ry="7" fill="#C75A35"/>
<path d="M69 146 q11 -12 22 0" stroke="#3A2618" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M109 146 q11 -12 22 0" stroke="#3A2618" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M76 166 q24 24 48 0 q-24 16 -48 0 Z" fill="#3A2618"/>
<ellipse cx="62" cy="158" rx="7" ry="4" fill="#FF8FA8"/>
<ellipse cx="138" cy="158" rx="7" ry="4" fill="#FF8FA8"/>
</g>
<g transform="translate(34,74)"><polygon class="s1" points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" fill="#FFD23F"/></g>
<g transform="translate(166,84)"><polygon class="s2" points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" fill="#FFD23F"/></g>
<g transform="translate(24,118)"><polygon class="s3" points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" fill="#FFD23F"/></g>
<g transform="translate(174,130)"><polygon class="s4" points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" fill="#FFD23F"/></g>
<g transform="translate(100,46)"><polygon class="s5" points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" fill="#FFD23F"/></g>
</svg>
