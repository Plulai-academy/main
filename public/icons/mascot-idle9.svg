<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>Idle berry mascot</title>
<style>
.bodyGroup{transform-origin:100px 210px;animation:idleSway 3.2s ease-in-out infinite;}
.eyeL{transform-origin:80px 136px;animation:blink 4.5s ease-in-out infinite;}
.eyeR{transform-origin:120px 136px;animation:blink 4.5s ease-in-out infinite;}
.stemLeaf{transform-origin:100px 86px;animation:leafRustle 3s ease-in-out infinite;}
.tailBerry{transform-origin:138px 180px;animation:tailSway 2.8s ease-in-out infinite;}
@keyframes idleSway{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);}}
@keyframes blink{0%,92%,100%{transform:scaleY(1);}96%{transform:scaleY(0.12);}}
@keyframes leafRustle{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
@keyframes tailSway{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
</style>
<ellipse cx="100" cy="218" rx="50" ry="8" fill="rgba(130,130,130,0.22)"/>
<g class="bodyGroup">
<g class="stemLeaf">
<path d="M100 86 C 98 74 102 64 108 56" stroke="#6FBF4A" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M108 56 C 118 50 130 52 134 62 C 124 64 112 64 108 56 Z" fill="#6FBF4A"/>
</g>
<path d="M44 144 C 28 140 18 148 14 162" stroke="#A8347A" stroke-width="9" fill="none" stroke-linecap="round"/>
<path d="M156 144 C 172 140 182 148 186 162" stroke="#A8347A" stroke-width="9" fill="none" stroke-linecap="round"/>
<path class="tailBerry" d="M138 180 C 154 176 162 186 156 196 C 150 190 142 190 138 192 Z" fill="#A8347A"/>
<path d="M100 86 C 136 86 154 118 150 152 C 146 188 124 210 100 210 C 76 210 54 188 50 152 C 46 118 64 86 100 86 Z" fill="#E0529C"/>
<ellipse cx="100" cy="150" rx="28" ry="34" fill="#F5A8CB" opacity="0.5"/>
<ellipse cx="80" cy="210" rx="13" ry="7" fill="#A8347A"/>
<ellipse cx="120" cy="210" rx="13" ry="7" fill="#A8347A"/>
<g class="eyeL"><ellipse cx="80" cy="136" rx="11" ry="14" fill="#FFFFFF"/><circle cx="83" cy="139" r="5" fill="#4A1830"/></g>
<g class="eyeR"><ellipse cx="120" cy="136" rx="11" ry="14" fill="#FFFFFF"/><circle cx="123" cy="139" r="5" fill="#4A1830"/></g>
<path d="M84 162 q16 12 32 0" stroke="#4A1830" stroke-width="4" fill="none" stroke-linecap="round"/>
</g>
</svg>
