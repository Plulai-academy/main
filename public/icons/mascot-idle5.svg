<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>Idle breeze mascot</title>
<style>
.bodyGroup{transform-origin:100px 212px;animation:idleSway 3.2s ease-in-out infinite;}
.eyeL{transform-origin:80px 132px;animation:blink 4.5s ease-in-out infinite;}
.eyeR{transform-origin:120px 132px;animation:blink 4.5s ease-in-out infinite;}
.tailWisp{transform-origin:138px 170px;animation:tailSway 2.8s ease-in-out infinite;}
@keyframes idleSway{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);}}
@keyframes blink{0%,92%,100%{transform:scaleY(1);}96%{transform:scaleY(0.12);}}
@keyframes tailSway{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
</style>
<ellipse cx="100" cy="220" rx="50" ry="8" fill="rgba(130,130,130,0.22)"/>
<g class="bodyGroup">
<g><circle cx="78" cy="70" r="16" fill="#C9C2FF"/><circle cx="100" cy="58" r="19" fill="#C9C2FF"/><circle cx="122" cy="70" r="16" fill="#C9C2FF"/></g>
<path d="M44 142 C 28 138 18 146 14 160" stroke="#5A4FB5" stroke-width="9" fill="none" stroke-linecap="round"/>
<path d="M156 142 C 172 138 182 146 186 160" stroke="#5A4FB5" stroke-width="9" fill="none" stroke-linecap="round"/>
<path class="tailWisp" d="M138 170 C 154 164 166 172 162 184 C 154 178 144 178 138 182 Z" fill="#5A4FB5"/>
<path d="M100 82 C 138 82 156 116 152 152 C 150 190 126 212 100 212 C 74 212 50 190 48 152 C 44 116 62 82 100 82 Z" fill="#8B7FE8"/>
<ellipse cx="100" cy="148" rx="30" ry="38" fill="#C9C2FF" opacity="0.5"/>
<ellipse cx="80" cy="212" rx="13" ry="7" fill="#5A4FB5"/>
<ellipse cx="120" cy="212" rx="13" ry="7" fill="#5A4FB5"/>
<g class="eyeL"><ellipse cx="80" cy="132" rx="11" ry="14" fill="#FFFFFF"/><circle cx="83" cy="135" r="5" fill="#2E2360"/></g>
<g class="eyeR"><ellipse cx="120" cy="132" rx="11" ry="14" fill="#FFFFFF"/><circle cx="123" cy="135" r="5" fill="#2E2360"/></g>
<path d="M84 158 q16 12 32 0" stroke="#2E2360" stroke-width="4" fill="none" stroke-linecap="round"/>
</g>
</svg>
