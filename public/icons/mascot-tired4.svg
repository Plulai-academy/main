<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 246" width="200" height="246">
<title>Tired droplet mascot</title>
<style>
.bodyGroup{transform-origin:100px 218px;animation:tiredSlump 3.6s ease-in-out infinite;}
.mouthYawn{transform-origin:100px 178px;animation:yawn 2.6s ease-in-out infinite;}
.z1{animation:floatUp 2.4s ease-in infinite;}
.z2{animation:floatUp 2.4s ease-in infinite 0.6s;}
.z3{animation:floatUp 2.4s ease-in infinite 1.2s;}
@keyframes tiredSlump{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(4px) rotate(-1.5deg);}}
@keyframes yawn{0%,78%,100%{transform:scaleY(1);}40%{transform:scaleY(1.6);}}
@keyframes floatUp{0%{transform:translateY(0);opacity:0;}20%{opacity:1;}100%{transform:translateY(-26px);opacity:0;}}
</style>
<ellipse cx="100" cy="226" rx="50" ry="8" fill="rgba(130,130,130,0.22)"/>
<g class="bodyGroup">
<path d="M98 70 C 92 56 94 42 106 36 C 102 48 106 58 98 70 Z" fill="#8FD9F2"/>
<path d="M46 150 C 30 146 20 154 16 168" stroke="#1C5F8E" stroke-width="9" fill="none" stroke-linecap="round"/>
<path d="M154 150 C 170 146 180 154 184 168" stroke="#1C5F8E" stroke-width="9" fill="none" stroke-linecap="round"/>
<path d="M146 188 C 162 182 174 192 168 206 C 158 200 148 200 144 204 Z" fill="#1C5F8E"/>
<path d="M100 70 C 130 110 158 150 152 184 C 148 206 126 222 100 222 C 74 222 52 206 48 184 C 42 150 70 110 100 70 Z" fill="#36A9E1"/>
<ellipse cx="100" cy="165" rx="28" ry="36" fill="#8FD9F2" opacity="0.5"/>
<ellipse cx="80" cy="218" rx="12" ry="6" fill="#1C5F8E"/>
<ellipse cx="120" cy="218" rx="12" ry="6" fill="#1C5F8E"/>
<path d="M69 152 q11 6 22 0" stroke="#0F3550" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M109 152 q11 6 22 0" stroke="#0F3550" stroke-width="4" fill="none" stroke-linecap="round"/>
<ellipse class="mouthYawn" cx="100" cy="178" rx="7" ry="9" fill="#0F3550"/>
</g>
<g>
<text class="z1" x="160" y="70" font-size="16" fill="#5F95B8">Z</text>
<text class="z2" x="174" y="56" font-size="14" fill="#5F95B8">Z</text>
<text class="z3" x="186" y="44" font-size="11" fill="#5F95B8">z</text>
</g>
</svg>
